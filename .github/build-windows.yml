name: Build RustDesk Windows (x64 + x86)

on:
  workflow_dispatch:          # запуск вручную из интерфейса GitHub
  push:
    tags:
      - 'v*'                  # или при пуше тега, например v1.2.7-custom

env:
  CUSTOM_HOST: "rustdesk.infoservice-msk.ru"
  CUSTOM_KEY:  "BuTV+ixMd3WdVVGX+uUkTFyFsJ7XAyTXjnjH6iteHZs="

jobs:
  # ─────────────────────────────────────────────
  # Windows x64
  # ─────────────────────────────────────────────
  build-x64:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk   # официальный репо (можно заменить на свой форк)
          ref: master
          submodules: recursive

      - name: Patch — вшиваем host и key
        shell: python
        run: |
          import re, pathlib

          CONFIG = pathlib.Path("libs/hbb_common/src/config.rs")
          text   = CONFIG.read_text(encoding="utf-8")

          # --- Rendezvous-серверы ---
          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS\s*:\s*&\[&str\]\s*=\s*&\[)[^\]]*(\])',
              r'\1"${{ env.CUSTOM_HOST }}"\2',
              text,
          )

          # --- Публичный ключ ---
          # Строка вида: pub const RS_PUB_KEY: &str = "...";
          text = re.sub(
              r'(pub const RS_PUB_KEY\s*:\s*&str\s*=\s*")[^"]*(")',
              r'\g<1>${{ env.CUSTOM_KEY }}\g<2>',
              text,
          )

          CONFIG.write_text(text, encoding="utf-8")
          print("=== Патч применён ===")
          print(CONFIG.read_text(encoding="utf-8")[:3000])

      - name: Install Rust toolchain (stable, x86_64)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-x64-${{ hashFiles('**/Cargo.lock') }}

      - name: Install vcpkg dependencies
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
          echo VCPKG_ROOT=C:\vcpkg >> %GITHUB_ENV%

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build RustDesk x64
        shell: cmd
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          python build.py --portable --hwcodec --flutter

      - name: Upload x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-x64
          path: |
            target/release/rustdesk.exe
            flutter/build/windows/x64/runner/Release/*.exe
          if-no-files-found: warn

  # ─────────────────────────────────────────────
  # Windows x86 (32-bit)
  # ─────────────────────────────────────────────
  build-x86:
    name: Windows x86 (32-bit)
    runs-on: windows-2022

    steps:
      - name: Checkout RustDesk source
        uses: actions/checkout@v4
        with:
          repository: rustdesk/rustdesk
          ref: master
          submodules: recursive

      - name: Patch — вшиваем host и key
        shell: python
        run: |
          import re, pathlib

          CONFIG = pathlib.Path("libs/hbb_common/src/config.rs")
          text   = CONFIG.read_text(encoding="utf-8")

          text = re.sub(
              r'(pub const RENDEZVOUS_SERVERS\s*:\s*&\[&str\]\s*=\s*&\[)[^\]]*(\])',
              r'\1"${{ env.CUSTOM_HOST }}"\2',
              text,
          )
          text = re.sub(
              r'(pub const RS_PUB_KEY\s*:\s*&str\s*=\s*")[^"]*(")',
              r'\g<1>${{ env.CUSTOM_KEY }}\g<2>',
              text,
          )

          CONFIG.write_text(text, encoding="utf-8")
          print("=== Патч применён ===")

      - name: Install Rust toolchain (stable, i686)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-x86-${{ hashFiles('**/Cargo.lock') }}

      - name: Install vcpkg dependencies (x86)
        shell: cmd
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          C:\vcpkg\vcpkg install libvpx:x86-windows-static libyuv:x86-windows-static opus:x86-windows-static aom:x86-windows-static
          echo VCPKG_ROOT=C:\vcpkg >> %GITHUB_ENV%

      - name: Setup Flutter (x86 target)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build RustDesk x86
        shell: cmd
        env:
          VCPKG_ROOT: C:\vcpkg
        run: |
          python build.py --portable --hwcodec --flutter --target i686-pc-windows-msvc

      - name: Upload x86 artifact
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-custom-x86
          path: |
            target/i686-pc-windows-msvc/release/rustdesk.exe
            flutter/build/windows/x86/runner/Release/*.exe
          if-no-files-found: warn
